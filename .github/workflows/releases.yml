name: Release DevContainers

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly forced release (Sunday at midnight)
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override auto-tag (e.g., v1.0.5) - leave empty for auto-increment'
        required: false
        default: ''
        type: string
  push:
    branches: [main]
    paths:
      - 'images/**'

env:
  GL_USERNAME: vikshan
  # Hardcoded repository string based on your README to ensure registry paths are perfect
  GHCR_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ============================================
  # Job 1: Auto-Tagging & Matrix Generation
  # ============================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      bases: ${{ steps.matrix.outputs.bases }}
      derivatives: ${{ steps.matrix.outputs.derivatives }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Auto-bump Tag
        id: auto_tag
        if: github.event.inputs.tag_override == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Set Final Tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag_override }}" ]; then
            echo "new_tag=${{ github.event.inputs.tag_override }}" >> $GITHUB_OUTPUT
          else
            echo "new_tag=${{ steps.auto_tag.outputs.new_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            bun: 'images/bun/**'
            ubuntu_tools: 'images/ubuntu-tools/**'
            bun_node: 'images/bun-node/**'
            ubuntu_bun: 'images/ubuntu-bun/**'
            ubuntu_bun_node: 'images/ubuntu-bun-node/**'

      - name: Construct DAG Matrices
        id: matrix
        run: |
          BASES=()
          DERIVATIVES=()

          # Force build ALL if scheduled or manually dispatched
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BASES=("bun" "ubuntu-tools")
            DERIVATIVES=("bun-node" "ubuntu-bun" "ubuntu-bun-node")
          else
            [ "${{ steps.filter.outputs.bun }}" == "true" ] && BASES+=("bun")
            [ "${{ steps.filter.outputs.ubuntu_tools }}" == "true" ] && BASES+=("ubuntu-tools")
            [ "${{ steps.filter.outputs.bun_node }}" == "true" ] && DERIVATIVES+=("bun-node")
            [ "${{ steps.filter.outputs.ubuntu_bun }}" == "true" ] && DERIVATIVES+=("ubuntu-bun")
            [ "${{ steps.filter.outputs.ubuntu_bun_node }}" == "true" ] && DERIVATIVES+=("ubuntu-bun-node")
          fi

          # Convert bash arrays to JSON strings for GitHub Actions
          printf -v BASES_JSON '["%s"]' "$(IFS='","'; echo "${BASES[*]}")"
          [ "${#BASES[@]}" -eq 0 ] && BASES_JSON="[]"

          printf -v DERIVATIVES_JSON '["%s"]' "$(IFS='","'; echo "${DERIVATIVES[*]}")"
          [ "${#DERIVATIVES[@]}" -eq 0 ] && DERIVATIVES_JSON="[]"

          echo "bases=$BASES_JSON" >> $GITHUB_OUTPUT
          echo "derivatives=$DERIVATIVES_JSON" >> $GITHUB_OUTPUT

  # ============================================
  # Job 2: Build Base Images First
  # ============================================
  build-bases:
    name: Base -> ${{ matrix.image }}
    needs: prepare
    if: ${{ needs.prepare.outputs.bases != '[]' && needs.prepare.outputs.bases != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.bases) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3.2.0
      - uses: docker/setup-buildx-action@v3.6.1

      - name: Log in to Registries
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3.3.0
        with:
          registry: registry.gitlab.com
          username: oauth2
          password: ${{ secrets.GITLAB_TOKEN }}
      - uses: docker/login-action@v3.3.0
        with:
          username: ${{ env.GL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: |
            ${{ env.GHCR_BASE }}/${{ matrix.image }}
            registry.gitlab.com/${{ env.GL_USERNAME }}/devcontainers/${{ matrix.image }}
            ${{ env.GL_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v6.5.0
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=min

      - name: Extract Size & Tool Versions via Skopeo
        run: |
          mkdir -p metadata

          # 1. Extract Size from remote manifest
          skopeo inspect docker://${{ env.GHCR_BASE }}/${{ matrix.image }}:latest | \
Add `-r` to jq: `jq -r '[.LayersData[] | .Size] | add / 1048576 | floor | tostring + " MB"'`

          # 2. Extract specific devcontainer.tool.* OCI Labels
          skopeo inspect docker://${{ env.GHCR_BASE }}/${{ matrix.image }}:latest | \
          jq -r '.Labels | to_entries[] | select(.key | startswith("devcontainer.tool.")) | "\(.key | sub("devcontainer\\.tool\\."; ""))=\(.value)"' > metadata/${{ matrix.image }}.versions

      - name: Upload Metadata
        uses: actions/upload-artifact@v4.3.4
        with:
          name: metadata-${{ matrix.image }}
          path: metadata/
          retention-days: 1

  # ============================================
  # Job 3: Build Derivative Images
  # ============================================
  build-derivatives:
    name: Deriv -> ${{ matrix.image }}
    needs: [prepare, build-bases]
    if: ${{ !failure() && !cancelled() && needs.prepare.outputs.derivatives != '[]' && needs.prepare.outputs.derivatives != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.derivatives) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3.2.0
      - uses: docker/setup-buildx-action@v3.6.1

      - name: Log in to Registries
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3.3.0
        with:
          registry: registry.gitlab.com
          username: oauth2
          password: ${{ secrets.GITLAB_TOKEN }}
      - uses: docker/login-action@v3.3.0
        with:
          username: ${{ env.GL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: |
            ${{ env.GHCR_BASE }}/${{ matrix.image }}
            registry.gitlab.com/${{ env.GL_USERNAME }}/devcontainers/${{ matrix.image }}
            ${{ env.GL_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v6.5.0
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=min

      - name: Extract Size & Tool Versions via Skopeo
        run: |
          mkdir -p metadata

          # 1. Extract Size from remote manifest
          skopeo inspect docker://${{ env.GHCR_BASE }}/${{ matrix.image }}:latest | \
          jq '[.LayersData[] | .Size] | add / 1048576 | floor | tostring + " MB"' > metadata/${{ matrix.image }}.size

          # 2. Extract specific devcontainer.tool.* OCI Labels
          skopeo inspect docker://${{ env.GHCR_BASE }}/${{ matrix.image }}:latest | \
          jq -r '.Labels | to_entries[] | select(.key | startswith("devcontainer.tool.")) | "\(.key | sub("devcontainer\\.tool\\."; ""))=\(.value)"' > metadata/${{ matrix.image }}.versions

      - name: Upload Metadata
        uses: actions/upload-artifact@v4.3.4
        with:
          name: metadata-${{ matrix.image }}
          path: metadata/
          retention-days: 1

  # ============================================
  # Job 4: Finalize Changelog & Documentation
  # ============================================
  finalize:
    name: Finalize Release Notes
    needs: [prepare, build-bases, build-derivatives]
    if: ${{ !failure() && !cancelled() && (needs.prepare.outputs.bases != '[]' || needs.prepare.outputs.derivatives != '[]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      # Uses our custom script to handle sizes, tools, README, CHANGELOG, and GH Release
      - name: Execute Notes Action
        uses: ./.github/actions/notes
        with:
          tag_name: ${{ needs.prepare.outputs.new_tag }}

  # ============================================
  # Job 5: Sync DockerHub READMEs
  # ============================================
  dockerhub-sync:
    name: Sync DockerHub -> ${{ matrix.image }}
    needs: finalize
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [bun, bun-node, ubuntu-tools, ubuntu-bun, ubuntu-bun-node]
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Push README to DockerHub
        uses: peter-evans/dockerhub-description@v4.0.0
        with:
          username: ${{ env.GL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.GL_USERNAME }}/${{ matrix.image }}
          readme-filepath: ./README.md

  # ============================================
  # Job 6: Standard GHCR Cleanup
  # ============================================
  cleanup:
    name: Prune Untagged GHCR Images
    needs: [build-bases, build-derivatives]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Clean GHCR
        uses: vlaurin/action-ghcr-prune@v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          organization: ${{ github.repository_owner }}
          container: devcontainers
          keep-younger-than: 7
          prune-untagged: true

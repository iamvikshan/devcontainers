name: Release DevContainers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "base/**"

env:
  GITHUB_REGISTRY: ghcr.io
  GITLAB_REGISTRY: registry.gitlab.com
  GITHUB_IMAGE_NAME: ${{ github.repository }}
  GITLAB_IMAGE_NAME: ${{ env.GITLAB_PROJECT_PATH }}
  GITLAB_PROJECT_ID: 64626588
  GITLAB_PROJECT_PATH: vikshan/devcontainers

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Log in to GitLab Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITLAB_REGISTRY }}
          username: oauth2
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Semantic Release
        id: semantic_release
        run: npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GIT_AUTHOR_NAME: vixshan
          GIT_AUTHOR_EMAIL: vixshan@gmail.com
          GIT_COMMITTER_NAME: vixshan
          GIT_COMMITTER_EMAIL: vixshan@gmail.com

      - name: Get latest release tag
        id: get_release_tag
        run: |
          VERSION=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            jq -r '.tag_name' | sed 's/v//')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build and push base containers
        run: |
          for dir in base/*/; do
            devcontainer_name=$(basename "$dir")
            if [ -f "$dir/.devcontainer/Dockerfile" ]; then
              # Build and push to GitHub
              docker buildx build \
                --file "$dir/.devcontainer/Dockerfile" \
                --push \
                --tag "${GITHUB_REGISTRY}/${GITHUB_IMAGE_NAME}/${devcontainer_name}:v${VERSION}" \
                --tag "${GITHUB_REGISTRY}/${GITHUB_IMAGE_NAME}/${devcontainer_name}:latest" \
                "$dir/.devcontainer"

              # Build and push to GitLab
              docker buildx build \
                --file "$dir/.devcontainer/Dockerfile" \
                --push \
                --tag "${GITLAB_REGISTRY}/${GITLAB_IMAGE_NAME}/${devcontainer_name}:v${VERSION}" \
                --tag "${GITLAB_REGISTRY}/${GITLAB_IMAGE_NAME}/${devcontainer_name}:latest" \
                "$dir/.devcontainer"
            fi
          done

      - name: Build and push Ubuntu containers
        run: |
          for dir in base/ubuntu/*/; do
            devcontainer_name=$(basename "$dir")
            if [ -f "$dir/Dockerfile" ]; then
              # Build and push to GitHub
              docker buildx build \
                --file "$dir/Dockerfile" \
                --push \
                --tag "${GITHUB_REGISTRY}/${GITHUB_IMAGE_NAME}/ubuntu-${devcontainer_name}:v${VERSION}" \
                --tag "${GITHUB_REGISTRY}/${GITHUB_IMAGE_NAME}/ubuntu-${devcontainer_name}:latest" \
                "$dir"

              # Build and push to GitLab
              docker buildx build \
                --file "$dir/Dockerfile" \
                --push \
                --tag "${GITLAB_REGISTRY}/${GITLAB_IMAGE_NAME}/ubuntu-${devcontainer_name}:v${VERSION}" \
                --tag "${GITLAB_REGISTRY}/${GITLAB_IMAGE_NAME}/ubuntu-${devcontainer_name}:latest" \
                "$dir"
            fi
          done

      - name: Create GitLab Release
        run: |
          curl --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{
              \"name\": \"v${VERSION}\",
              \"tag_name\": \"v${VERSION}\",
              \"description\": \"Release v${VERSION}\"
            }" \
            "${GITLAB_REGISTRY}/api/v4/projects/${{ secrets.GITLAB_PROJECT_ID }}/releases"

      - name: Wait and Update image sizes
        run: |
          sleep 5
          echo "GITLAB_TOKEN=${{ secrets.GITLAB_TOKEN }}" > .env
          npm run s && npm run f

      - name: Commit README updates
        run: |
          git config --global user.email "vixshan@gmail.com"
          git config --global user.name "vixshan"
          git add README.md base/*/README.md
          git commit --amend --no-edit
          git push -f origin HEAD:${{ github.ref_name }}

          # Push to GitLab
          git remote add gitlab "${GITLAB_REGISTRY}/${GITLAB_IMAGE_NAME}.git"
          git push -f gitlab HEAD:${{ github.ref_name }}

name: Release DevContainers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "base/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'Release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Semantic Release
        run: npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: vixshan
          GIT_AUTHOR_EMAIL: vixshan@gmail.com
          GIT_COMMITTER_NAME: vixshan
          GIT_COMMITTER_EMAIL: vixshan@gmail.com

      - name: Get latest release tag
        id: get_release_tag
        run: |
          VERSION=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            jq -r '.tag_name' | sed 's/v//')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build and push base containers
        run: |
          for dir in base/*/; do
            devcontainer_name=$(basename "$dir")
            if [ -f "$dir/.devcontainer/Dockerfile" ]; then
              docker buildx build \
                --file "$dir/.devcontainer/Dockerfile" \
                --push \
                --tag "${REGISTRY}/${IMAGE_NAME}/${devcontainer_name}:v${VERSION}" \
                --tag "${REGISTRY}/${IMAGE_NAME}/${devcontainer_name}:latest" \
                "$dir/.devcontainer"
            fi
          done

      - name: Build and push Ubuntu containers
        run: |
          for dir in base/ubuntu/*/; do
            devcontainer_name=$(basename "$dir")
            if [ -f "$dir/Dockerfile" ]; then
              docker buildx build \
                --file "$dir/Dockerfile" \
                --push \
                --tag "${REGISTRY}/${IMAGE_NAME}/ubuntu-${devcontainer_name}:v${VERSION}" \
                --tag "${REGISTRY}/${IMAGE_NAME}/ubuntu-${devcontainer_name}:latest" \
                "$dir"
            fi
          done

      - name: Wait and Update image sizes
        run: |
          sleep 5
          echo "GITLAB_TOKEN=${{ secrets.GITLAB_TOKEN }}" > .env
          npm run s && npm run f

      - name: Commit README updates
        run: |
          git add README.md base/*/README.md
          git commit --amend --no-edit
          git push -f origin HEAD:${{ github.ref_name }}

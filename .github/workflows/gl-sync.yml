name: GitLab Sync

on:
  push:
    branches: ["*"]
  delete:
    branches: ["*"]
  pull_request:
    types: [opened, closed, reopened, edited, labeled, unlabeled]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Determine Default Branch
        id: default-branch
        run: |
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          echo "default_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT

      - name: Setup GitLab CLI
        uses: iamvikshan/.github/.github/actions/setup-gitlab-cli@main
        with:
          gitlab-token: ${{ secrets.GITLAB_TOKEN }}

      - name: Manage GitLab Repository
        uses: iamvikshan/.github/.github/actions/manage-gitlab-repo@main
        with:
          gitlab-token: ${{ secrets.GITLAB_TOKEN }}
          gitlab-username: "vikshan"
          repo-name: ${{ github.event.repository.name }}
          default-branch: ${{ steps.default-branch.outputs.default_branch }}

      - name: Sync Repository
        uses: iamvikshan/.github/.github/actions/sync-repository@main
        with:
          gitlab-token: ${{ secrets.GITLAB_TOKEN }}
          github-token: ${{ secrets.GH_TOKEN }}
          gitlab-username: "vikshan"
          repo-name: ${{ github.event.repository.name }}
          default-branch: ${{ steps.default-branch.outputs.default_branch }}

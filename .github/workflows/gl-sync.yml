name: Sync to GitLab

on:
  push:
    branches:
      - "**"
  delete:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "vikshan"
          git config user.email "vixshan@gmail.com"
          
          if [ -z "${{ secrets.GITLAB_TOKEN }}" ]; then
            echo "Error: GITLAB_TOKEN not set"
            exit 1
          fi

      - name: Sync with GitLab
        run: |
          echo "Adding GitLab remote..."
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/vikshan/devcontainers.git

          echo "Fetching remotes..."
          git fetch gitlab --prune --no-tags
          git fetch origin --prune --no-tags

          echo "Listing branches:"
          echo "GitHub branches:"
          git branch -r | grep 'origin/'
          echo "GitLab branches:"
          git branch -r | grep 'gitlab/'

          # Get branch lists
          github_branches=$(git branch -r | grep 'origin/' | sed 's/origin\///')
          gitlab_branches=$(git branch -r | grep 'gitlab/' | sed 's/gitlab\///')

          # Protected branches that shouldn't be deleted
          protected_branches="main master"

          # Delete non-protected branches in GitLab that don't exist in GitHub
          for branch in $gitlab_branches; do
            if ! echo "$github_branches" | grep -q "^$branch$"; then
              if ! echo "$protected_branches" | grep -q "\b$branch\b"; then
                echo "Deleting non-protected branch $branch from GitLab"
                git push gitlab --delete "$branch" || echo "Warning: Failed to delete $branch"
              else
                echo "Skipping deletion of protected branch: $branch"
              fi
            fi
          done

          # Update/create branches in GitLab
          for branch in $github_branches; do
            echo "Syncing branch: $branch"
            if git checkout -B "$branch" "origin/$branch"; then
              if git push -f gitlab "$branch:$branch"; then
                echo "Successfully synced $branch"
              else
                echo "Error: Failed to push $branch"
              fi
            else
              echo "Error: Failed to checkout $branch"
            fi
          done
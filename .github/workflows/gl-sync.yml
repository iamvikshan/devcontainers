name: GitLab Sync
on:
  push:
    branches:
      - "*"
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update sizes
        run: |
          echo "GITLAB_TOKEN=${{ secrets.GITLAB_TOKEN }}" > .env
          chmod +x scripts/update-sizes.sh
          ./scripts/update-sizes.sh

          # Commit size updates if there are changes
          git add .
          git config user.name "vikshan"
          git config user.email "vixshan@gmail.com"
          if git diff --staged --quiet; then
            echo "No size changes to commit"
          else
            git commit -m "chore: Update sizes [skip ci]"
          fi

      - name: Sync with GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/vikshan/devcontainers.git

          # Fetch GitLab branches
          git fetch gitlab

          # List and sync each branch
          git branch -r | grep 'origin/' | sed 's#origin/##' | while read branch; do
            git checkout -B "${branch}" "origin/${branch}"
            
            # Check if branch exists on GitLab and is up to date
            if git rev-parse --verify "gitlab/${branch}" >/dev/null 2>&1; then
              if [ "$(git rev-parse HEAD)" = "$(git rev-parse gitlab/${branch})" ]; then
                echo "Branch ${branch} is up to date on GitLab, skipping..."
                continue
              fi
            fi
            
            # Push only if there are changes
            git push -f gitlab "${branch}:${branch}"
          done

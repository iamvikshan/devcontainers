sync-github:
  image: alpine:latest
  stage: sync-github
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE !~ /^GitHub Sync/ && $CI_COMMIT_MESSAGE !~ /Release/
      when: always
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
  before_script:
    - apk add --no-cache git
    - git config --global user.name "vixshan"
    - git config --global user.email "vixshan@gmail.com"
  script:
    - git remote add github https://$GH_TOKEN@github.com/vixshan/devcontainers.git
    - |
      git fetch origin --no-tags
      for branch in $(git branch -r | grep 'origin/' | grep -v 'origin/HEAD' | sed 's#origin/##'); do
        if git show-ref --verify --quiet refs/remotes/origin/"$branch"; then
          git checkout -B "$branch" "origin/$branch"
          git commit --allow-empty -m "GitLab Sync: $CI_COMMIT_MESSAGE"
          git push -f github "$branch:$branch"
        fi
      done

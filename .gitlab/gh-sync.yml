sync-github:
  image: alpine:latest
  stage: sync-github
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE !~ /^GitHub Sync/
      when: always
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
  before_script:
    - apk add --no-cache git
    - git config --global user.name "vixshan"
    - git config --global user.email "vixshan@gmail.com"
  script:
    # Add commit message prefix to indicate sync source
    - git remote add github https://$GH_TOKEN@github.com/vixshan/devcontainers.git
    - |
      for branch in $(git branch -r | grep 'origin/' | sed 's/origin//'); do
        git checkout -B "$branch" "origin/$branch"
        git commit --allow-empty -m "GitLab Sync: $CI_COMMIT_MESSAGE"
        git push -f github "$branch:$branch"
      done

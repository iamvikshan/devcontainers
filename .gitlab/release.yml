# .gitlab/release.yml
.release_template: &release_template
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"

release:
  <<: *release_template
  stage: release
  before_script:
    - apk add --no-cache curl jq git npm grep
    - docker login -u oauth2 -p $GITLAB_TOKEN $CI_REGISTRY
    - docker context create builders
    - docker context use builders
    - docker buildx create --use --name builder --node builder0 --driver
      docker-container
    - docker buildx inspect --bootstrap
    - npm ci
  script:
    - |
      # Get release version
      VERSION=$(npx semantic-release --no-ci | tee /tmp/semrel.log | grep "The next release version is" | sed -n 's/.*The next release version is \([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')

      if [ -z "$VERSION" ]; then
        if grep -q "no new version" /tmp/semrel.log; then
          echo "No new version to release"
          exit 0
        else
          echo "Failed to get version"
          cat /tmp/semrel.log
          exit 1
        fi
      fi

      # Build base containers
      for dir in base/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/.devcontainer/Dockerfile" ]; then
          docker buildx build \
            --file "$dir/.devcontainer/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:v${VERSION}" \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:latest" \
            "$dir/.devcontainer"
        fi
      done

      # Build Ubuntu containers
      for dir in base/ubuntu/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/Dockerfile" ]; then
          docker buildx build \
            --file "$dir/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:v${VERSION}" \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:latest" \
            "$dir"
        fi
      done

      # Create GitLab Release with changelog
      curl --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"v${VERSION}\",
          \"tag_name\": \"v${VERSION}\",
          \"ref\": \"${CI_COMMIT_SHA}\",
          \"description\": \"$(git log -1 --pretty=%B)\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always

# .gitlab/ci/release.yml
.release_template: &release_template
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache curl jq git npm
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

release:
  <<: *release_template
  stage: release
  script:
    # Install and configure semantic-release
    - npm install -g semantic-release @semantic-release/git @semantic-release/changelog
    
    # Run semantic-release to get the next version
    - |
      SEMVER=$(npx semantic-release --dry-run | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "1.0.0")
      
      if [ -z "$SEMVER" ]; then
        echo "No new version to release"
        exit 0
      fi
      
      echo "Building version ${SEMVER}"
      
      # Build and push base containers
      for dir in base/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/.devcontainer/Dockerfile" ]; then
          docker buildx build \
            --file "$dir/.devcontainer/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:${SEMVER}" \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:latest" \
            "$dir/.devcontainer"
        else
          echo "No Dockerfile found in $dir/.devcontainer"
        fi
      done

      # Build and push Ubuntu-based containers
      for dir in base/ubuntu/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/Dockerfile" ]; then
          docker buildx build \
            --file "$dir/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:${SEMVER}" \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:latest" \
            "$dir"
        else
          echo "No Dockerfile found in $dir"
        fi
      done

      # Create GitLab Release and Tag
      curl --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"Release ${SEMVER}\",
          \"tag_name\": \"${SEMVER}\",
          \"ref\": \"${CI_COMMIT_SHA}\",
          \"description\": \"DevContainer release ${SEMVER}\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - base/**/*
    - if: $CI_PIPELINE_SOURCE == "web"
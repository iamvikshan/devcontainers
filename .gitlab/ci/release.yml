# .gitlab/ci/release.yml
.release_template: &release_template
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache curl jq git npm
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

release:
  <<: *release_template
  stage: release
  script:
    # Install semantic-release and plugins
    - npm init -y
    - npm install --save-dev semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/commit-analyzer @semantic-release/release-notes-generator
    
    # Create semantic-release config
    - |
      cat > .releaserc.json << EOF
      {
        "branches": ["main"],
        "plugins": [
          "@semantic-release/commit-analyzer",
          "@semantic-release/release-notes-generator",
          "@semantic-release/changelog",
          "@semantic-release/git"
        ]
      }
      EOF
    
    # Run semantic-release to get the next version
    - |
      SEMVER=$(npx semantic-release --dry-run --no-ci | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
      
      if [ -z "$SEMVER" ]; then
        echo "No new version to release based on commit messages"
        exit 0
      fi
      
      echo "Building version ${SEMVER}"
      
      # Build and push base containers
      for dir in base/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/.devcontainer/Dockerfile" ]; then
          echo "Building base container: ${devcontainer_name}"
          docker buildx build \
            --file "$dir/.devcontainer/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:${SEMVER}" \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:latest" \
            "$dir/.devcontainer"
        fi
      done

      # Build and push Ubuntu-based containers
      for dir in base/ubuntu/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/Dockerfile" ]; then
          echo "Building Ubuntu container: ${devcontainer_name}"
          docker buildx build \
            --file "$dir/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:${SEMVER}" \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:latest" \
            "$dir"
        fi
      done

      # Create GitLab Release
      curl --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"Release ${SEMVER}\",
          \"tag_name\": \"${SEMVER}\",
          \"ref\": \"${CI_COMMIT_SHA}\",
          \"description\": \"DevContainer release ${SEMVER}\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
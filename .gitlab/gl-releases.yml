# .gitlab/release.yml
.release_template: &release_template
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
    # Add Git environment variables
    GIT_AUTHOR_NAME: "vikshan"
    GIT_AUTHOR_EMAIL: "vixshan@gmail.com"
    GIT_COMMITTER_NAME: "vikshan"
    GIT_COMMITTER_EMAIL: "vixshan@gmail.com"

release:
  <<: *release_template
  stage: release
  before_script:
    - apk add --no-cache curl jq git npm grep bash
    - docker login -u oauth2 -p $GITLAB_TOKEN $CI_REGISTRY
    - docker context create builders
    - docker context use builders
    - docker buildx create --use --name builder --node builder0 --driver docker-container
    - docker buildx inspect --bootstrap
    - npm ci
    # Configure git authentication
    - git config --global url."https://oauth2:${GITLAB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
    # Export Git environment variables
    - export GIT_AUTHOR_NAME="vikshan"
    - export GIT_AUTHOR_EMAIL="vixshan@gmail.com"
    - export GIT_COMMITTER_NAME="vikshan"
    - export GIT_COMMITTER_EMAIL="vixshan@gmail.com"
  script:
    - |
      # Run semantic-release first
      npx semantic-release
      VERSION=$(curl -s -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/latest" | jq -r '.tag_name' | sed 's/v//')

      if [ -z "$VERSION" ]; then
        echo "Failed to get version from latest release"
        exit 1
      fi

      # Build base containers
      for dir in base/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/.devcontainer/Dockerfile" ]; then
          docker buildx build \
            --file "$dir/.devcontainer/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:v${VERSION}" \
            --tag "${CI_REGISTRY_IMAGE}/${devcontainer_name}:latest" \
            "$dir/.devcontainer"
        fi
      done

      # Build Ubuntu containers
      for dir in base/ubuntu/*/; do
        devcontainer_name=$(basename "$dir")
        if [ -f "$dir/Dockerfile" ]; then
          docker buildx build \
            --file "$dir/Dockerfile" \
            --push \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:v${VERSION}" \
            --tag "${CI_REGISTRY_IMAGE}/ubuntu-${devcontainer_name}:latest" \
            "$dir"
        fi
      done

      # Wait for registry updates
      echo "Waiting for registry updates..."
      sleep 5

      # Update image sizes
      npm run s && npm run f

      # Git operations with environment variables already set
      git add README.md base/*/README.md
      git commit --amend --no-edit
      git push -f "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git" HEAD:$CI_COMMIT_REF_NAME
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^Release/ && $CI_COMMIT_MESSAGE !~ /^GitHub Sync/'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
